name: test

on:
  push:
  pull_request:

jobs:
  node-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax check (moduli, server, tools)
        run: |
          for f in js/*.js server/*.js tools/*.js tools/test/*.js dev-server.js; do
            node --check "$f"
          done

      - name: Suite di test (zero dipendenze)
        run: node tools/test/run-all.js

      - name: Verifica build del file singolo
        run: node tools/bundle.js
